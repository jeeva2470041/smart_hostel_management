<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hostel Management — Login</title>
    <meta name="description" content="Hostel Management System — secure login for students and administrators." />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="login-body">

    <main class="d-flex align-items-center min-vh-100 py-4">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-10 col-xl-9">
                    <div class="auth-card">
                        <div class="row g-0" style="min-height: 520px;">

                            <!-- Hero Side -->
                            <div class="col-lg-6 d-none d-lg-flex auth-hero">
                                <div style="position: relative; z-index: 1;">
                                    <div class="mb-4" style="font-size: 2.5rem;">🏠</div>
                                    <h2>Welcome Back</h2>
                                    <p class="mb-4">Access room allocations, manage students, and view real-time dashboards.</p>
                                    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                                        <span style="background: rgba(255,255,255,0.12); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8125rem;">🔒 Secure</span>
                                        <span style="background: rgba(255,255,255,0.12); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8125rem;">⚡ Fast</span>
                                        <span style="background: rgba(255,255,255,0.12); padding: 0.4rem 1rem; border-radius: 100px; font-size: 0.8125rem;">📱 Responsive</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Form Side -->
                            <div class="col-lg-6 d-flex align-items-center auth-form-section" id="formSection">

                                <!-- LOGIN VIEW -->
                                <div id="loginView" style="width: 100%; max-width: 380px; margin: 0 auto;">
                                    <div class="text-center mb-4">
                                        <div class="auth-brand mx-auto">🏠</div>
                                        <h4 class="mb-1" style="font-weight: 800;">Hostel Management</h4>
                                        <p class="text-muted small">Sign in to continue</p>
                                    </div>

                                    <form id="loginForm" onsubmit="login(event)">
                                        <div class="mb-3">
                                            <label for="username" class="form-label">Username</label>
                                            <input type="text" class="form-control form-control-lg" id="username" placeholder="Enter username" required>
                                        </div>
                                        <div class="mb-3">
                                            <label for="password" class="form-label">Password</label>
                                            <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter password" required>
                                        </div>
                                        <div class="d-grid mb-3">
                                            <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                                        </div>
                                    </form>

                                    <div class="text-center mb-3">
                                        <span class="text-muted" style="font-size: 0.8125rem;">New student?</span>
                                        <button class="btn btn-outline-primary btn-sm ms-2" onclick="showRegisterForm()">Create Account</button>
                                    </div>

                                    <hr />
                                    <div class="text-center" style="font-size: 0.8125rem;">
                                        <span class="text-muted">Demo Credentials</span>
                                        <div class="mt-1 text-muted">Admin: <code>admin</code> / <code>admin123</code></div>
                                        <div class="text-muted">Student: <code>student1</code> / <code>student123</code></div>
                                    </div>
                                </div>

                                <!-- REGISTER VIEW (hidden) -->
                                <div id="registerView" style="width: 100%; max-width: 420px; margin: 0 auto; display: none;">
                                    <div class="d-flex align-items-center mb-3">
                                        <button class="btn btn-outline-secondary btn-sm me-3" onclick="hideRegisterForm()">← Back</button>
                                        <h5 class="mb-0" style="font-weight: 700;">Student Registration</h5>
                                    </div>
                                    <form id="studentRegisterForm" onsubmit="registerStudent(event)">
                                        <div class="row">
                                            <div class="col-12 mb-2">
                                                <label class="form-label">Student Type *</label>
                                                <select class="form-select" id="regStudentType" required>
                                                    <option value="UG">UG (Undergraduate)</option>
                                                    <option value="PG">PG (Postgraduate)</option>
                                                    <option value="MBA">MBA</option>
                                                </select>
                                            </div>
                                            <div class="col-12 mb-2">
                                                <label class="form-label">Username *</label>
                                                <input type="text" class="form-control" id="regUsername" required placeholder="Choose a username">
                                            </div>
                                            <div class="col-12 mb-2">
                                                <label class="form-label">Password *</label>
                                                <input type="password" class="form-control" id="regPassword" required placeholder="Create a password">
                                            </div>
                                            <div class="col-12 mb-2">
                                                <label class="form-label">Email *</label>
                                                <input type="email" class="form-control" id="regEmail" required placeholder="your@email.com">
                                            </div>
                                            <div class="col-12 mb-2">
                                                <label class="form-label">Registration Number *</label>
                                                <input type="text" class="form-control" id="regNumber" required placeholder="e.g. REG001">
                                            </div>
                                            <div class="col-6 mb-2">
                                                <label class="form-label">Phone *</label>
                                                <input type="tel" class="form-control" id="regPhone" required placeholder="Phone number">
                                            </div>
                                            <div class="col-3 mb-2">
                                                <label class="form-label">Year *</label>
                                                <input type="number" class="form-control" id="regYear" min="1" max="4" required placeholder="1-4">
                                            </div>
                                            <div class="col-3 mb-2">
                                                <label class="form-label">Attend %</label>
                                                <input type="number" class="form-control" id="regAttendance" min="0" max="100" step="0.1" required placeholder="85">
                                            </div>
                                        </div>
                                        <div class="d-flex gap-2 mt-3">
                                            <button type="submit" class="btn btn-success flex-fill">Register</button>
                                            <button type="button" class="btn btn-outline-secondary flex-fill" onclick="hideRegisterForm()">Cancel</button>
                                        </div>
                                    </form>
                                </div>
                            </div>

                        </div>
                    </div>
                    <p class="text-center small text-muted mt-3">© <span id="year"></span> Hostel Management System</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            const el = document.getElementById('year');
            if (el) el.textContent = new Date().getFullYear();
        });

        function showRegisterForm() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('registerView').style.display = 'block';
        }

        function hideRegisterForm() {
            document.getElementById('registerView').style.display = 'none';
            document.getElementById('loginView').style.display = 'block';
            document.getElementById('studentRegisterForm').reset();
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
